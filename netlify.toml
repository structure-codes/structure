# Netlify owns deploys: production on merge to main, Deploy Previews on PRs.
# The lint/build quality gate runs in GitHub Actions on the PR (see .github/workflows/ci.yaml),
# so the build command here is just the build — it's used for both production and previews.
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Match .nvmrc so the Netlify build uses the same Node major as local/dev.
  NODE_VERSION = "20"

[functions]
  # Bundle the TypeScript functions with esbuild.
  node_bundler = "esbuild"

[dev]
  # `netlify dev` runs Vite as the framework dev server and proxies it,
  # serving functions and applying the redirects below on the same origin.
  command = "vite"
  targetPort = 3000
  port = 8888

# Each function under netlify/functions declares its own `/api/...` route via
# `config.path`, so no explicit redirect is needed to reach the API.

# SPA fallback: serve index.html for all other routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
